<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodToday - Safe blood for all</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            
            /* --- BACKGROUND IMAGE --- */
            /* Make sure your image is named bg.jpg inside your static folder! */
            background-image: url("{{ url_for('static', filename='bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
        }

        /* --- HEADER STYLES --- */
        .header {
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-bottom: 4px solid #d32f2f; /* Red bottom border for theme */
        }
        .header-left {
            font-size: 14px;
            color: #555;
        }
        .header-left a {
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        .header-right {
            text-align: right;
        }
        .site-name {
            font-size: 28px;
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 2px;
        }
        .tagline {
            font-size: 14px;
            color: #555;
            font-style: italic;
        }

        /* --- MAIN PAGE & FORMS --- */
        .container {
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .msg {
            background-color: #e8f5e9; color: #2e7d32;
            padding: 15px; border-radius: 5px; text-align: center;
            margin-bottom: 30px; width: 100%; max-width: 800px;
            font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .error { background-color: #ffebee; color: #c62828; }

        /* Puts the two forms side-by-side */
        .forms-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap; /* Stacks them on smaller laptop screens */
            width: 100%;
            max-width: 900px;
        }
        .form-card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            flex: 1;
            min-width: 300px;
        }
        .form-card h2 {
            color: #d32f2f; margin-top: 0;
            border-bottom: 2px solid #eee; padding-bottom: 10px;
        }
        
        /* Inputs & Buttons */
        label { font-weight: bold; font-size: 14px; color: #555; }
        input[type="text"] {
            width: 100%; padding: 12px; margin: 8px 0 20px 0;
            border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }
        button {
            background-color: #d32f2f; color: white; padding: 14px 20px;
            border: none; border-radius: 5px; cursor: pointer; width: 100%;
            font-size: 16px; font-weight: bold; transition: 0.3s;
        }
        button:hover { background-color: #b71c1c; }
        .search-btn { background-color: #1976d2; }
        .search-btn:hover { background-color: #115293; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            Email<br>
            <a href="mailto:info@bloodtoday.com">info@bloodtoday.com</a>
        </div>
        <div class="header-right">
            <div class="site-name">BloodToday</div>
            <div class="tagline">Safe blood for all</div>
        </div>
    </div>
    <div class="container">
        
        {% if message %}
            <div class="msg {% if 'Error' in message %}error{% endif %}">{{ message }}</div>
        {% endif %}

        <div class="forms-wrapper">
            
            <div class="form-card">
                <h2>Register as a Donor</h2>
                <form action="/register" method="POST">
                    <label>Name:</label>
                    <input type="text" name="name" required>
                    
                    <label>Blood Group:</label>
                    <input type="text" name="blood_group" placeholder="e.g., O+, A-" required>
                    
                    <label>Phone:</label>
                    <input type="text" name="phone" required>
                    
                    <label>City:</label>
                    <input type="text" name="city" required>
                    
                    <button type="submit">Register Donor</button>
                </form>
            </div>

            <div class="form-card">
                <h2>Search for a Donor</h2>
                <form action="/search" method="GET">
                    <label>Blood Group:</label>
                    <input type="text" name="blood_group" placeholder="e.g., O+, A-" required>
                    
                    <label>City:</label>
                    <input type="text" name="city" required>
                    
                    <button type="submit" class="search-btn">Search Donors</button>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
