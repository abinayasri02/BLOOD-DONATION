<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Modern Premium CSS */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            width: 55%;
            margin: 50px auto;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }
        .input-field {
            width: 42%; 
            padding: 15px;
            margin: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        .input-field:focus {
            border-color: darkred;
            outline: none;
            box-shadow: 0 0 8px rgba(139, 0, 0, 0.2);
        }
        .btn-primary {
            background: darkred;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        .btn-primary:hover {
            background: red;
            transform: translateY(-2px);
            box-shadow: 0px 6px 15px rgba(255, 0, 0, 0.4);
        }
    </style>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; background-image: url('/static/bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; margin: 0; min-height: 100vh;">

    <div style="display: flex; justify-content: space-between; padding: 20px 40px; background: rgba(255, 255, 255, 0.95); color: darkred; border-bottom: 5px solid red; box-shadow: 0px 4px 10px rgba(0,0,0,0.1);">
        <div style="text-align: left;">
            <h3 style="margin: 0; font-size: 18px;"><i class="fa-solid fa-envelope"></i> Email us</h3>
            <p style="margin: 0; font-weight: bold; color: red;">info@bloodtoday.com</p>
        </div>
        <div style="text-align: right;">
            <h1 style="margin: 0; font-size: 32px; font-weight: 900;">BloodToday</h1>
            <p style="margin: 0; font-style: italic; color: #555;">Safe blood for all</p>
        </div>
    </div>

    <div class="glass-card">
        <h2 style="color: darkred; font-size: 28px; margin-bottom: 20px;"><i class="fa-solid fa-magnifying-glass"></i> Search for a Donor</h2>
        
        <form action="/search" method="POST" style="display: flex; flex-wrap: wrap; justify-content: center;">
            <input type="text" name="blood_group" placeholder="Blood Group (e.g., O+) *" class="input-field" required>
            <input type="text" name="state" placeholder="State *" class="input-field" required>
            <input type="text" name="district" placeholder="District *" class="input-field" required>
            <input type="text" name="locality" placeholder="Locality *" class="input-field" required>
            
            <div style="width: 100%;">
                <button type="submit" class="btn-primary">Search Donors</button>
            </div>
        </form>

        {% if searched %}
            <hr style="margin: 30px 0; border: 1px solid #ddd;">
            <h3 style="color: darkred; text-align: left;">Matching Donors:</h3>
            {% for donor in donors %}
                <div style="background: #fff; border-left: 6px solid darkred; padding: 20px; margin: 15px 0; border-radius: 8px; text-align: left; display: flex; justify-content: space-between; align-items: center; box-shadow: 0px 4px 10px rgba(0,0,0,0.1);">
                    <div>
                        <strong style="font-size: 20px; color: #333;"><i class="fa-solid fa-user"></i> {{ donor['name'] }}</strong> <br>
                        <span style="color: #666; font-size: 16px; margin-top: 5px; display: inline-block;"><i class="fa-solid fa-phone"></i> {{ donor['phone'] }}</span>
                    </div>
                    <a href="/request_donor/{{ donor['id'] }}" style="background: red; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; box-shadow: 0px 4px 10px rgba(255,0,0,0.3);"><i class="fa-solid fa-bell"></i> Request</a>
                </div>
            {% else %}
                <div style="background: #ffe6e6; color: darkred; padding: 20px; border-radius: 8px; font-weight: bold;">
                    <i class="fa-solid fa-circle-exclamation"></i> No donors found in this exact location.
                </div>
            {% endfor %}
        {% endif %}
        
        <br>
        <a href="/" style="color: #555; text-decoration: none; font-size: 16px; margin-top: 20px; display: inline-block; font-weight: bold;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>

</body>
</html>
