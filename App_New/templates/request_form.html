<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            width: 55%;
            margin: 50px auto;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }
        .input-field {
            width: 42%; 
            padding: 15px;
            margin: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        .input-field-full {
            width: 90%;
            padding: 15px;
            margin: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        textarea.input-field-full {
            font-family: Arial, sans-serif;
            resize: vertical;
        }
        .input-field:focus, .input-field-full:focus {
            border-color: red;
            outline: none;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.2);
        }
        .btn-submit {
            background: red;
            color: white;
            padding: 15px 50px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            box-shadow: 0px 4px 10px rgba(255,0,0,0.3);
        }
        .btn-submit:hover {
            background: darkred;
            transform: translateY(-2px);
        }
        .section-title {
            text-align: left;
            color: #555;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 10px;
            font-size: 20px;
        }
    </style>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; background-image: url('/static/bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; margin: 0; min-height: 100vh;">

    <div style="display: flex; justify-content: space-between; padding: 20px 40px; background: rgba(255, 255, 255, 0.95); color: darkred; border-bottom: 5px solid red; box-shadow: 0px 4px 10px rgba(0,0,0,0.1);">
        <div style="text-align: left;">
            <h3 style="margin: 0; font-size: 18px;"><i class="fa-solid fa-envelope"></i> Email us</h3>
            <p style="margin: 0; font-weight: bold; color: red;">info@bloodtoday.com</p>
        </div>
        <div style="text-align: right;">
            <h1 style="margin: 0; font-size: 32px; font-weight: 900;">BloodToday</h1>
            <p style="margin: 0; font-style: italic; color: #555;">Safe blood for all</p>
        </div>
    </div>

    <div class="glass-card">
        <h2 style="color: red; font-size: 28px; margin-bottom: 5px;"><i class="fa-solid fa-heart-pulse"></i> Request Blood from {{ donor['name'] }}</h2>
        <p style="color: #666; font-size: 15px; margin-bottom: 20px;">Please fill out all details carefully. An urgent email will be sent directly to the donor.</p>
        
        <form action="/request_donor/{{ donor['id'] }}" method="POST" style="display: flex; flex-wrap: wrap; justify-content: center;">
            
            <div style="width: 90%;"><h4 class="section-title"><i class="fa-solid fa-bed-pulse"></i> Patient Details</h4></div>
            
            <input type="text" name="patient_name" placeholder="Patient Name *" class="input-field" required>
            <input type="text" name="patient_blood_group" placeholder="Blood Group Needed *" class="input-field" required>
            
            <input type="text" name="district" placeholder="District *" class="input-field" required>
            <input type="text" name="locality" placeholder="Locality *" class="input-field" required>
            
            <input type="text" name="hospital" placeholder="Hospital Name & Full Address *" class="input-field-full" required>

            <div style="width: 90%;"><h4 class="section-title"><i class="fa-solid fa-address-book"></i> Contact Details</h4></div>
            
            <input type="text" name="contact_name" placeholder="Your Name *" class="input-field" required>
            <input type="text" name="contact_phone" placeholder="Your Phone Number *" class="input-field" required>
            
            <textarea name="message" placeholder="Type your urgent message to the donor here... *" class="input-field-full" required style="height: 100px;"></textarea>

            <div style="width: 100%;">
                <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Send Urgent Request</button>
            </div>
        </form>
        
        <br>
        <a href="/search" style="color: #555; text-decoration: none; font-size: 16px; margin-top: 20px; display: inline-block; font-weight: bold;"><i class="fa-solid fa-arrow-left"></i> Cancel & Back to Search</a>
    </div>

</body>
</html>
