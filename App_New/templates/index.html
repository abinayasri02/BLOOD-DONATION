<!DOCTYPE html>
<html>
<head>
    <title>BloodToday App</title>
</head>
<body style="font-family: Arial; text-align: center; background-image: url('/static/bg.jpg'); background-size: cover; background-position: center; color: #333; margin: 0; padding: 20px;">
    
    <h1 style="color: darkred; background-color: rgba(255, 255, 255, 0.8); display: inline-block; padding: 10px 20px; border-radius: 10px;">🩸 BloodToday</h1>
    
    {% if message %}
        <h3 style="color: green; background-color: rgba(255, 255, 255, 0.9); display: inline-block; padding: 10px; border-radius: 5px;">{{ message }}</h3>
    {% endif %}

    <div style="background: rgba(255, 255, 255, 0.95); padding: 20px; width: 50%; margin: 20px auto; border-radius: 10px; box-shadow: 0px 4px 8px rgba(0,0,0,0.2);">
        <h2 style="color: darkred;">Register as a Donor</h2>
        <form action="/register" method="POST">
            <input type="text" name="name" placeholder="Full Name" required style="padding: 8px; margin: 5px; width: 80%;"><br>
            <input type="text" name="blood_group" placeholder="Blood Group (e.g., O+)" required style="padding: 8px; margin: 5px; width: 80%;"><br>
            <input type="text" name="phone" placeholder="Phone Number" required style="padding: 8px; margin: 5px; width: 80%;"><br>
            <input type="text" name="city" placeholder="City (e.g., Chennai)" required style="padding: 8px; margin: 5px; width: 80%;"><br>
            <input type="text" name="locality" placeholder="Locality (e.g., Anna Nagar)" required style="padding: 8px; margin: 5px; width: 80%;"><br>
            <button type="submit" style="background: red; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold;">Register</button>
        </form>
    </div>

    <div style="background: rgba(255, 255, 255, 0.95); padding: 20px; width: 50%; margin: 20px auto; border-radius: 10px; box-shadow: 0px 4px 8px rgba(0,0,0,0.2);">
        <h2 style="color: darkred;">Hospital Search & Alert</h2>
        <form action="/search" method="GET">
            <input type="text" name="blood_group" placeholder="Blood Group (e.g., O+)" required style="padding: 8px; margin: 5px; width: 80%;"><br>
            <input type="text" name="city" placeholder="City (e.g., Chennai)" required style="padding: 8px; margin: 5px; width: 80%;"><br>
            <input type="text" name="locality" placeholder="Locality (e.g., Anna Nagar)" style="padding: 8px; margin: 5px; width: 80%;"><br>
            <input type="text" name="hospital_name" placeholder="Hospital Name" style="padding: 8px; margin: 5px; width: 80%;"><br>
            <button type="submit" style="background: darkred; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold;">Search & Send SMS Alerts</button>
        </form>
    </div>

</body>
</html>
